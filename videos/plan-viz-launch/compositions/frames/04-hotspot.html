<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- head is metadata only; the HyperFrames runtime clones <template> contents only -->
  </head>
  <body>
    <template>
      <style>
        /* ---- fonts (verbatim from frame.md; only families that ship as real files) ---- */
        @font-face{font-family:'Inter';font-style:normal;font-weight:400;src:url('assets/fonts/Inter-400.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:500;src:url('assets/fonts/Inter-500.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:600;src:url('assets/fonts/Inter-600.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:700;src:url('assets/fonts/Inter-700.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:800;src:url('assets/fonts/Inter-800.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:900;src:url('assets/fonts/Inter-900.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:italic;font-weight:500;src:url('assets/fonts/Inter-500-italic.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:italic;font-weight:600;src:url('assets/fonts/Inter-600-italic.woff2') format('woff2');font-display:block}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:400;src:url('assets/fonts/JetBrainsMono-400.woff2') format('woff2');font-display:block}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:500;src:url('assets/fonts/JetBrainsMono-500.woff2') format('woff2');font-display:block}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:700;src:url('assets/fonts/JetBrainsMono-700.woff2') format('woff2');font-display:block}

        /* ---- root : style via #root only (never a class on the data-composition-id element) ---- */
        #root {
          position: relative;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          background: #0b1220;
          font-family: "Inter", sans-serif;
        }

        /* ---- ground : dedicated full-duration clip, lowest track, NOT painted on #root ---- */
        .ground {
          position: absolute;
          inset: 0;
          background-color: #0b1220;
          background-image:
            linear-gradient(to right, rgba(80, 140, 240, 0.12) 1px, transparent 1px),
            linear-gradient(to bottom, rgba(80, 140, 240, 0.12) 1px, transparent 1px);
          background-size: 40px 40px;
        }

        /* ---- scene wrapper (top clip for the shot content) ---- */
        .scene {
          position: absolute;
          inset: 0;
        }

        /* ---- the recurring floating window ---- */
        .window-frame {
          position: absolute;
          left: 320px;
          top: 137px;
          width: 1280px;
          height: 720px;
          border-radius: 18px;
          border: 1.5px solid rgba(91, 157, 255, 0.35);
          box-shadow: 0 30px 90px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(91, 157, 255, 0.1);
          overflow: hidden;
          background: #0f172a;
        }

        /* ---- camera : outer scales, inner translates (coordinate-target-zoom) ---- */
        .cam-outer {
          position: absolute;
          inset: 0;
          transform-origin: 50% 50%;
          will-change: transform;
        }
        .cam-inner {
          position: absolute;
          inset: 0;
          will-change: transform;
        }

        /* ---- two stacked copies of the same capture : back defocuses, front stays a sharp spotlight ---- */
        .shot-back,
        .shot-front {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          object-fit: cover;
          display: block;
        }
        .shot-back {
          z-index: 1;
          --dof: 0px;
          filter: blur(var(--dof));
          opacity: 1;
          will-change: filter, opacity;
        }
        .shot-front {
          z-index: 2;
          /* sharp spotlight mask centered on the hotspot node (measured: 40.0%, 82.6% of the capture) */
          -webkit-mask-image: radial-gradient(circle at 40% 82.6%, black 0px, black 95px, transparent 165px);
          mask-image: radial-gradient(circle at 40% 82.6%, black 0px, black 95px, transparent 165px);
        }

        /* ---- hotspot ring + glow (screen-fixed overlay graphics, not camera-transformed) ---- */
        .ring-glow {
          position: absolute;
          left: 420px;
          top: 380px;
          width: 440px;
          height: 300px;
          border-radius: 50%;
          background: radial-gradient(ellipse, rgba(239, 68, 68, 0.9) 0%, rgba(239, 68, 68, 0) 70%);
          transform-origin: 50% 50%;
          will-change: transform, opacity;
          z-index: 5;
        }
        .ring {
          position: absolute;
          left: 530px;
          top: 390px;
          width: 220px;
          height: 280px;
          border-radius: 50%;
          border: 4px solid rgba(239, 68, 68, 0.95);
          transform-origin: 50% 50%;
          will-change: transform, opacity;
          z-index: 6;
        }

        /* ---- hotspot badge chip ---- */
        .chip {
          position: absolute;
          left: 762px;
          top: 348px;
          display: flex;
          align-items: center;
          gap: 10px;
          padding: 12px 20px;
          border-radius: 999px;
          background: rgba(11, 18, 32, 0.92);
          border: 1.5px solid rgba(239, 68, 68, 0.55);
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
          transform-origin: 0% 50%;
          will-change: transform, opacity;
          z-index: 7;
        }
        .chip-dot {
          width: 8px;
          height: 8px;
          border-radius: 50%;
          background: #ef4444;
          box-shadow: 0 0 10px 2px rgba(239, 68, 68, 0.8);
        }
        .chip-text {
          font-family: "JetBrains Mono", monospace;
          font-weight: 500;
          font-size: 20px;
          letter-spacing: 0.04em;
          color: #ef4444;
          white-space: nowrap;
        }

        /* ---- lower-third reveal line (sits below the window, above the keep-out line) ---- */
        .line-reveal {
          position: absolute;
          left: 50%;
          top: 872px;
          transform: translateX(-50%);
          display: flex;
          gap: 0.32em;
          flex-wrap: wrap;
          justify-content: center;
          max-width: 1500px;
        }
        .word {
          display: inline-block;
          font-family: "Inter", sans-serif;
          font-weight: 500;
          font-size: 36px;
          line-height: 1.2;
          color: #e6edf7;
          will-change: transform, opacity;
        }
        .word.accent {
          color: #5b9dff;
        }
      </style>

      <div id="root" data-composition-id="04-hotspot" data-width="1920" data-height="1080" data-duration="4">
        <div class="ground clip" data-start="0" data-duration="3.5" data-track-index="0"></div>

        <div class="scene clip" data-start="0" data-duration="3.5" data-track-index="1">
          <div class="window-frame">
            <div class="cam-outer" id="cam-outer">
              <div class="cam-inner" id="cam-inner">
                <img class="shot-back" id="shot-back" src="assets/hotspot.png" alt="" />
                <img class="shot-front" id="shot-front" src="assets/hotspot.png" alt="" />
              </div>
            </div>

            <div class="ring-glow" id="ring-glow"></div>
            <div class="ring" id="ring"></div>

            <div class="chip" id="chip">
              <div class="chip-dot"></div>
              <div class="chip-text">HOTSPOT &middot; by A-Time</div>
            </div>
          </div>

          <div class="line-reveal" id="line-reveal">
            <span class="word" data-w="0">The</span>
            <span class="word" data-w="1">bottleneck</span>
            <span class="word" data-w="2">&mdash;</span>
            <span class="word" data-w="3">ringed</span>
            <span class="word accent" data-w="4">automatically.</span>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        /*
         * coordinate-target-zoom — camera math
         * Window (the floating app capture) is 1280x720 local px; the source PNG
         * matches the window's aspect exactly so it renders 1:1 with no crop at
         * scale 1. The hotspot node ("TABLE ACCESS FULL ORDERS", red ring badge)
         * was measured directly on assets/hotspot.png at 40.0% / 82.6% of the
         * frame -> window-local target (512, 595.7).
         *
         * Outer scales around window-center (640,360); inner translate cancels
         * the target's offset from that center (T = -offset) so the target moves
         * toward center as the camera pushes in. Because the target sits low in
         * the frame, a full re-center would require scale >= ~2.9x to keep the
         * bottom edge covered — too aggressive a push for a 3.5s beat — so the
         * vertical component is clamped to the coverage-safe bound at the chosen
         * ZOOM_SCALE (with margin), landing the node just below center instead of
         * dead-center. Horizontal offset (-128) is well inside the safe bound and
         * is applied in full, so the node lands horizontally centered.
         */
        const ZOOM_SCALE = 2.0;
        const T_X = 128; // -(-128) — full horizontal correction, well within coverage bound (320px @ S=2)
        const T_Y = -150; // clamped from the full -235 correction (coverage bound is 180px @ S=2; kept 30px margin)

        const FOCUS_START = 0.15;
        const FOCUS_DUR = 0.95; // camera + DoF settle by t ~= 1.10s, inside the 0-1.2s Scene 1 window

        tl.to(
          "#cam-outer",
          { scale: ZOOM_SCALE, duration: FOCUS_DUR, ease: "power3.inOut" },
          FOCUS_START,
        );
        tl.to(
          "#cam-inner",
          { x: T_X, y: T_Y, duration: FOCUS_DUR, ease: "power3.inOut" },
          FOCUS_START,
        );

        /*
         * depth-of-field-blur — focal pull, applied via two stacked copies of the
         * same capture: the back copy blurs + dims (the "surrounding area sinks
         * under a soft blue depth-of-field blur"), the front copy is masked to a
         * soft circle over the hotspot node and stays permanently sharp (the
         * "spotlight"). Runs on the SAME window as the camera push so the world
         * recedes into blur exactly as the camera zooms toward the node.
         */
        tl.to(
          "#shot-back",
          { "--dof": "13px", opacity: 0.5, duration: FOCUS_DUR, ease: "power2.inOut" },
          FOCUS_START,
        );

        /*
         * asr-keyword-glow — attack/sustain/decay/rest envelope, reproduced as an
         * explicit 3-stage tween sequence (a single ring, not a run of words, so
         * the driver/onUpdate form collapses to one authored pulse). Finite, no
         * loop: pop-in -> attack peak -> decay to a low rest glow that holds.
         */
        const RING_IN = 1.2;
        tl.fromTo(
          "#ring",
          { scale: 0.55, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.22, ease: "power3.out" },
          RING_IN,
        );
        tl.fromTo(
          "#ring-glow",
          { scale: 0.55, opacity: 0 },
          { scale: 1, opacity: 0.55, duration: 0.22, ease: "power3.out" },
          RING_IN,
        );

        const ATTACK_AT = RING_IN + 0.22; // 1.42
        tl.to("#ring", { scale: 1.16, duration: 0.18, ease: "power2.out" }, ATTACK_AT);
        tl.to("#ring-glow", { scale: 1.32, opacity: 0.9, duration: 0.18, ease: "power2.out" }, ATTACK_AT);

        const DECAY_AT = ATTACK_AT + 0.18; // 1.60
        tl.to("#ring", { scale: 1.0, duration: 0.35, ease: "power2.inOut" }, DECAY_AT);
        tl.to("#ring-glow", { scale: 1.05, opacity: 0.32, duration: 0.35, ease: "power2.inOut" }, DECAY_AT); // rest level — subtle held breadcrumb

        // spring-pop-entrance — the "HOTSPOT · by A-Time" chip pops in beside the ring, same beat as the attack.
        tl.fromTo(
          "#chip",
          { scale: 0, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.45, ease: "power3.out" },
          ATTACK_AT,
        );

        /*
         * dynamic-content-sequencing (per-word reveal) — the lower-third line
         * lands word by word once the pulse beat has resolved, then settles and
         * holds to the end of the shot. Deterministic index-derived stagger.
         */
        const LINE_START = 2.4;
        const WORD_STAGGER = 0.12;
        const WORD_DUR = 0.4;
        const words = gsap.utils.toArray(".word");
        words.forEach((el, i) => {
          tl.fromTo(
            el,
            { y: 16, opacity: 0 },
            { y: 0, opacity: 1, duration: WORD_DUR, ease: "power3.out" },
            LINE_START + i * WORD_STAGGER,
          );
        });
        // shot settles and holds through the remainder of the 3.5s duration (no exit tween).

        window.__timelines["04-hotspot"] = tl;
      </script>
    </template>
  </body>
</html>
