<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>01-problem</title>
  </head>
  <body>
    <template>
      <style>
        @font-face{font-family:'Inter';font-style:normal;font-weight:400;src:url('assets/fonts/Inter-400.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:500;src:url('assets/fonts/Inter-500.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:600;src:url('assets/fonts/Inter-600.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:700;src:url('assets/fonts/Inter-700.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:800;src:url('assets/fonts/Inter-800.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:900;src:url('assets/fonts/Inter-900.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:italic;font-weight:500;src:url('assets/fonts/Inter-500-italic.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:italic;font-weight:600;src:url('assets/fonts/Inter-600-italic.woff2') format('woff2');font-display:block}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:400;src:url('assets/fonts/JetBrainsMono-400.woff2') format('woff2');font-display:block}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:500;src:url('assets/fonts/JetBrainsMono-500.woff2') format('woff2');font-display:block}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:700;src:url('assets/fonts/JetBrainsMono-700.woff2') format('woff2');font-display:block}

        /* Root: style by #root only (class selectors on the root are dropped by the
           composited-render CSS scoper). container-type:size activates cqw/cqh units. */
        #root {
          position: absolute;
          inset: 0;
          overflow: hidden;
          container-type: size;
          font-family: "Inter", sans-serif;
        }
        #root * {
          box-sizing: border-box;
        }

        /* full-bleed navy ground + faint blue graph-paper grid — its own clip layer */
        #bg-grid {
          background-color: #0b1220;
          background-image:
            linear-gradient(rgba(80, 140, 240, 0.12) 1px, transparent 1px),
            linear-gradient(90deg, rgba(80, 140, 240, 0.12) 1px, transparent 1px);
          background-size: 2cqw 2cqw;
        }

        /* Scene 1 — cold raw-plan scroll layer */
        #raw-scene {
          overflow: hidden;
        }
        .raw-camera {
          position: absolute;
          inset: 0;
          overflow: hidden;
          transform-origin: 50% 50%;
          will-change: transform;
        }
        .raw-img {
          position: absolute;
          top: 0;
          left: 0;
          width: 100cqw;
          height: auto;
          opacity: 0.55;
          filter: grayscale(55%) brightness(0.62) contrast(0.92) saturate(0.75);
          will-change: opacity;
        }
        .scrim {
          position: absolute;
          inset: 0;
          background: radial-gradient(
            ellipse at 50% 35%,
            rgba(11, 18, 32, 0.15) 0%,
            rgba(11, 18, 32, 0.78) 100%
          );
          opacity: 0;
          will-change: opacity;
        }

        /* Scene 2 — kinetic-type headline */
        .headline-stage {
          position: absolute;
          left: 50%;
          top: 42%;
          transform: translate(-50%, -50%);
          width: 68cqw;
        }
        .headline-wrap {
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
          align-items: baseline;
          gap: 1.2cqw 1.6cqw;
          will-change: transform;
        }
        .word {
          font-family: "Inter";
          font-weight: 400;
          font-size: 6.9cqw;
          line-height: 1.05;
          letter-spacing: -0.008em;
          color: #e6edf7;
        }
        .word-this {
          font-family: "JetBrains Mono";
          font-weight: 500;
          letter-spacing: 0.01em;
          color: #5b9dff;
        }
      </style>

      <div
        id="root"
        data-composition-id="01-problem"
        data-width="1920"
        data-height="1080"
        data-duration="3"
      >
        <div id="bg-grid" class="clip" data-start="0" data-duration="3" data-track-index="0"></div>

        <div id="raw-scene" class="clip" data-start="0" data-duration="3" data-track-index="1">
          <div class="raw-camera" id="raw-camera">
            <img class="raw-img" id="raw-img" src="assets/rawplan-table.png" alt="" />
          </div>
          <div class="scrim" id="scrim"></div>
        </div>

        <div id="headline-scene" class="clip" data-start="0" data-duration="3" data-track-index="2">
          <div class="headline-stage">
            <div class="headline-wrap" id="headline-wrap">
              <span class="word" id="w0">You</span>
              <span class="word" id="w1">read</span>
              <span class="word" id="w2">Oracle</span>
              <span class="word" id="w3">plans</span>
              <span class="word" id="w4">like</span>
              <span class="word word-this" id="w5">THIS?</span>
            </div>
          </div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Scene 1 (0.0-1.2s) — slow upward scroll that decelerates to a halt.
        // Drive the IMG (inside the overflow:hidden camera), not the camera itself:
        // scaling the camera would push its box 29px past the frame edge (clipped
        // visually, but flagged by inspect). Scaling the img stays inside the clip.
        tl.fromTo(
          "#raw-img",
          { y: 0, scale: 1.0 },
          { y: -62, scale: 1.03, duration: 1.2, ease: "power2.out" },
          0,
        );

        // Scene 2 (1.2-3.0s) — the scroll has halted; darken/desaturate further.
        tl.fromTo(
          "#raw-img",
          { opacity: 0.55 },
          { opacity: 0.3, duration: 0.6, ease: "power2.out" },
          1.2,
        );
        tl.fromTo(
          "#scrim",
          { opacity: 0 },
          { opacity: 0.62, duration: 0.6, ease: "power2.out" },
          1.2,
        );

        // Per-word staggered headline reveal, paced into the back half of the shot.
        const WORDS = ["#w0", "#w1", "#w2", "#w3", "#w4", "#w5"];
        const WORD_START = 1.3;
        const STAGGER = 0.12;
        const POP_DUR = 0.4;

        WORDS.forEach((sel, i) => {
          tl.fromTo(
            sel,
            { opacity: 0, y: 20 },
            { opacity: 1, y: 0, duration: POP_DUR, ease: "power3.out" },
            WORD_START + i * STAGGER,
          );
        });

        // "THIS?" flicks from ink-soft blue to hot red on its own beat, right after landing.
        const lastWordStart = WORD_START + (WORDS.length - 1) * STAGGER;
        const flickAt = lastWordStart + POP_DUR + 0.15;
        tl.fromTo(
          "#w5",
          { color: "#5b9dff" },
          { color: "#ef4444", duration: 0.12, ease: "power1.in" },
          flickAt,
        );

        // Settle + a tiny, finite, low-amplitude jitter (no repeat/yoyo) to close the hold.
        const jitterAt = flickAt + 0.12 + 0.15;
        tl.fromTo(
          "#headline-wrap",
          { x: 0, y: 0 },
          { x: 1.5, y: -1, duration: 0.14, ease: "sine.inOut" },
          jitterAt,
        );
        tl.fromTo(
          "#headline-wrap",
          { x: 1.5, y: -1 },
          { x: 0, y: 0, duration: 0.16, ease: "sine.inOut" },
          jitterAt + 0.14,
        );

        window.__timelines["01-problem"] = tl;
      </script>
    </template>
  </body>
</html>
