<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>02-promise</title>
  </head>
  <body>
    <template>
      <style>
        @font-face{font-family:'Inter';font-style:normal;font-weight:400;src:url('assets/fonts/Inter-400.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:500;src:url('assets/fonts/Inter-500.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:600;src:url('assets/fonts/Inter-600.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:700;src:url('assets/fonts/Inter-700.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:800;src:url('assets/fonts/Inter-800.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:900;src:url('assets/fonts/Inter-900.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:italic;font-weight:500;src:url('assets/fonts/Inter-500-italic.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:italic;font-weight:600;src:url('assets/fonts/Inter-600-italic.woff2') format('woff2');font-display:block}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:400;src:url('assets/fonts/JetBrainsMono-400.woff2') format('woff2');font-display:block}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:500;src:url('assets/fonts/JetBrainsMono-500.woff2') format('woff2');font-display:block}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:700;src:url('assets/fonts/JetBrainsMono-700.woff2') format('woff2');font-display:block}

        #root {
          position: absolute;
          inset: 0;
          overflow: hidden;
          font-family: 'Inter', sans-serif;
        }

        /* ---- Layer 1: full-bleed navy ground + faint blue grid + hairlines ---- */
        .ground {
          position: absolute;
          inset: 0;
          background-color: #0b1220;
          background-image:
            linear-gradient(rgba(80, 140, 240, 0.12) 1px, transparent 1px),
            linear-gradient(90deg, rgba(80, 140, 240, 0.12) 1px, transparent 1px);
          background-size: 38px 38px;
        }
        .hairline {
          position: absolute;
          left: 77px;
          right: 77px;
          height: 2px;
          background: rgba(230, 237, 247, 0.28);
        }
        .hairline-top { top: 64px; }
        .hairline-bottom { bottom: 64px; }

        /* ---- Layer 2: content ---- */
        .content {
          position: absolute;
          inset: 0;
        }

        .stage {
          position: absolute;
          inset: 0;
          display: grid;
          place-items: center;
          perspective: 1400px;
          will-change: transform;
        }

        /* -- fragment cloud (depth-scatter-assemble) -- */
        .cloud-stage {
          position: relative;
          width: 120px;
          height: 120px;
          display: grid;
          place-items: center;
          transform-style: preserve-3d;
          will-change: transform, opacity;
        }
        .frag {
          position: absolute;
          top: 50%;
          left: 50%;
          width: 14px;
          height: 14px;
          border-radius: 50%;
          background: #5b9dff;
          box-shadow: 0 0 14px 2px rgba(91, 157, 255, 0.85);
          transform-style: preserve-3d;
          backface-visibility: hidden;
          will-change: transform, opacity;
        }
        #center-node {
          position: absolute;
          top: 50%;
          left: 50%;
          width: 22px;
          height: 22px;
          margin: -11px 0 0 -11px;
          border-radius: 50%;
          background: #e6edf7;
          box-shadow:
            0 0 40px 10px rgba(91, 157, 255, 0.9),
            0 0 90px 30px rgba(91, 157, 255, 0.45);
          filter: url(#streak);
          will-change: transform, opacity, filter;
        }

        /* -- ambient glow bloom behind the wordmark -- */
        #wm-glow {
          position: absolute;
          width: 900px;
          height: 360px;
          border-radius: 50%;
          background: radial-gradient(closest-side, rgba(91, 157, 255, 0.38), rgba(91, 157, 255, 0) 72%);
          opacity: 0;
          pointer-events: none;
          will-change: transform, opacity;
        }

        /* -- wordmark lockup -- */
        .wordmark {
          position: relative;
          display: flex;
          align-items: baseline;
          gap: 20px;
        }
        .wm-glyph {
          display: inline-flex;
          align-items: flex-end;
          /* NOTE: vertical nudge is folded into the GSAP tween's `y` (not CSS transform) —
             this element is GSAP-animated (x/y/opacity), so a static CSS transform here
             would be silently overwritten (gsap_css_transform_conflict). */
        }
        .wm-text {
          display: flex;
          align-items: baseline;
          gap: 0.32em;
          font-family: 'Inter', sans-serif;
          font-weight: 700;
          font-size: 72px;
          letter-spacing: -0.01em;
          color: #e6edf7;
          white-space: nowrap;
        }
        .chunk {
          display: inline-block;
        }

        /* -- tagline: three-beat kinetic slam -- */
        .tagline {
          position: absolute;
          top: 632px;
          left: 50%;
          transform: translateX(-50%);
          display: flex;
          gap: 26px;
        }
        .beat {
          display: inline-block;
          font-family: 'Inter', sans-serif;
          font-style: italic;
          font-weight: 500;
          font-size: 50px;
          color: #5b9dff;
          letter-spacing: -0.005em;
        }
      </style>

      <div id="root" data-composition-id="02-promise" data-width="1920" data-height="1080" data-duration="2.5">
        <div class="ground clip" data-start="0" data-duration="2.5" data-track-index="0">
          <div class="hairline hairline-top"></div>
          <div class="hairline hairline-bottom"></div>
        </div>

        <div class="content clip" data-start="0" data-duration="2.5" data-track-index="1">
          <!-- Directional/radial blur filter for the convergence-arrival streak (motion-blur-streak, Path A) -->
          <svg width="0" height="0" aria-hidden="true" style="position: absolute">
            <defs>
              <filter id="streak" x="-100%" y="-100%" width="300%" height="300%">
                <feGaussianBlur id="streak-blur" in="SourceGraphic" stdDeviation="0 0" />
              </filter>
            </defs>
          </svg>

          <div class="stage" id="stage">
            <div class="cloud-stage" id="cloud-stage">
              <div class="frag" data-i="0"></div>
              <div class="frag" data-i="1"></div>
              <div class="frag" data-i="2"></div>
              <div class="frag" data-i="3"></div>
              <div class="frag" data-i="4"></div>
              <div class="frag" data-i="5"></div>
              <div class="frag" data-i="6"></div>
              <div id="center-node"></div>
            </div>

            <div id="wm-glow"></div>

            <div class="wordmark">
              <span class="wm-glyph" id="wm-glyph">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="6" y="4" width="36" height="40" rx="5" stroke="#5b9dff" stroke-width="2.5" />
                  <rect x="14" y="28" width="5" height="10" fill="#5b9dff" />
                  <rect x="21.5" y="22" width="5" height="16" fill="#5b9dff" />
                  <rect x="29" y="16" width="5" height="22" fill="#5b9dff" />
                </svg>
              </span>
              <span class="wm-text">
                <span class="chunk" id="chunk-0">Oracle</span>
                <span class="chunk" id="chunk-1">Plan</span>
                <span class="chunk" id="chunk-2">Visualizer</span>
              </span>
            </div>
          </div>

          <div class="tagline">
            <span class="beat" id="beat-0">Paste.</span>
            <span class="beat" id="beat-1">See.</span>
            <span class="beat" id="beat-2">Fix.</span>
          </div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        /* =========================================================
           Scene 1 (0.0-0.9s) — depth-scatter-assemble + motion-blur-streak
           Several fragments scatter into a rotating 3D cloud, then
           converge to ONE bright node dead-center with an arrival blur.
        ========================================================= */
        const GOLDEN = Math.PI * (3 - Math.sqrt(5)); // even angular spread, deterministic
        const RADIUS = 520;
        const Z_NEAR = 220;
        const Z_FAR = -220;
        const TUMBLE = 65;
        const ASSEMBLE_DUR = 0.5;
        const STAGGER = 0.05;
        const ASSEMBLE_EASE = "power3.out";
        const FRAG_START = 0.05;
        const CLOUD_SPIN_DEG = 18;
        const CLOUD_SPIN_DUR = 0.9;

        const frags = Array.from(document.querySelectorAll(".frag"));
        const n = frags.length;
        const scatter = frags.map((el, i) => {
          const a = i * GOLDEN;
          const depthT = n > 1 ? i / (n - 1) : 0;
          return {
            x: Math.cos(a) * RADIUS,
            y: Math.sin(a) * RADIUS,
            z: Z_NEAR - depthT * (Z_NEAR - Z_FAR),
            rotationX: Math.sin(a) * TUMBLE,
            rotationY: Math.cos(a) * TUMBLE,
          };
        });

        // Park every fragment in the cloud BEFORE any tween fires (deterministic seek from t=0).
        frags.forEach((el, i) => {
          const s = scatter[i];
          gsap.set(el, {
            xPercent: -50,
            yPercent: -50,
            x: s.x,
            y: s.y,
            z: s.z,
            rotationX: s.rotationX,
            rotationY: s.rotationY,
            opacity: 0,
          });
        });
        gsap.set("#center-node", { opacity: 0, scale: 0.3 });

        // The cloud rotates gently so the scatter has life before it collapses.
        tl.to("#cloud-stage", { rotationY: CLOUD_SPIN_DEG, duration: CLOUD_SPIN_DUR, ease: "power1.out" }, 0);

        // Every fragment converges to the SAME target (0,0,0) — several fragments, ONE node.
        frags.forEach((el, i) => {
          tl.to(
            el,
            { x: 0, y: 0, z: 0, rotationX: 0, rotationY: 0, opacity: 1, duration: ASSEMBLE_DUR, ease: ASSEMBLE_EASE },
            FRAG_START + i * STAGGER,
          );
        });

        // Arrival: the bright node scales up as the fragments lock in, with a symmetric
        // (depth-push) directional blur that resolves to 0 exactly on the settle.
        const blurNode = document.getElementById("streak-blur");
        const blurProxy = { v: 18 };
        const writeBlur = () => blurNode.setAttribute("stdDeviation", `${blurProxy.v} ${blurProxy.v}`);
        writeBlur(); // seed frame 0

        tl.fromTo("#center-node", { opacity: 0, scale: 0.3 }, { opacity: 1, scale: 1, duration: 0.3, ease: "power3.out" }, 0.55);
        tl.to(blurProxy, { v: 0, duration: 0.3, ease: "power3.out", onUpdate: writeBlur }, 0.55);

        // The cloud (fragments + node) hands off to the wordmark bloom.
        tl.to("#cloud-stage", { opacity: 0, duration: 0.25, ease: "power1.out" }, 0.85);

        /* =========================================================
           Scene 2 (0.9-1.8s) — ambient-glow-bloom + wordmark assemble
           The node blooms into the lockup; wordmark builds left->right
           per chunk while the stage settles to its ~40% anchor.
        ========================================================= */
        tl.to("#stage", { y: -320, duration: 0.4, ease: "power3.out" }, 0.9);

        tl.fromTo("#wm-glow", { opacity: 0, scale: 0.85 }, { opacity: 0.32, scale: 1, duration: 0.5, ease: "power2.out" }, 0.9);

        const CHUNKS = [
          // wm-glyph carries a constant y:6 baseline nudge on BOTH from/to (GSAP owns the
          // whole transform for this element, so the nudge lives here, not in CSS).
          { sel: "#wm-glyph", start: 0.95, dur: 0.35, fromX: -24, y: 6 },
          { sel: "#chunk-0", start: 1.05, dur: 0.35, fromX: -20, y: 0 },
          { sel: "#chunk-1", start: 1.15, dur: 0.3, fromX: -20, y: 0 },
          { sel: "#chunk-2", start: 1.25, dur: 0.4, fromX: -20, y: 0 },
        ];
        CHUNKS.forEach((c) => {
          tl.fromTo(
            c.sel,
            { x: c.fromX, y: c.y, opacity: 0 },
            { x: 0, y: c.y, opacity: 1, duration: c.dur, ease: "power3.out" },
            c.start,
          );
        });

        /* =========================================================
           Scene 3 (1.8-2.5s) — kinetic-beat-slam
           "Paste. See. Fix." lands as three distinct-entrance beats
           on one shared beat array, then holds still.
        ========================================================= */
        const BEATS = [1.85, 2.02, 2.19];

        tl.fromTo(
          "#beat-0",
          { scale: 1.5, filter: "blur(14px)", opacity: 0 },
          { scale: 1, filter: "blur(0px)", opacity: 1, duration: 0.28, ease: "power4.out" },
          BEATS[0],
        );
        tl.fromTo("#beat-1", { x: -120, opacity: 0 }, { x: 0, opacity: 1, duration: 0.24, ease: "expo.out" }, BEATS[1]);
        tl.fromTo(
          "#beat-2",
          { y: 40, rotation: 8, opacity: 0 },
          { y: 0, rotation: 0, opacity: 1, duration: 0.24, ease: "circ.out" },
          BEATS[2],
        );

        window.__timelines["02-promise"] = tl;
      </script>
    </template>
  </body>
</html>
