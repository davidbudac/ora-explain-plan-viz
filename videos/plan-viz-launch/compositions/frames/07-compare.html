<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        @font-face{font-family:'Inter';font-style:normal;font-weight:400;src:url('assets/fonts/Inter-400.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:500;src:url('assets/fonts/Inter-500.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:600;src:url('assets/fonts/Inter-600.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:700;src:url('assets/fonts/Inter-700.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:800;src:url('assets/fonts/Inter-800.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:900;src:url('assets/fonts/Inter-900.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:italic;font-weight:500;src:url('assets/fonts/Inter-500-italic.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:italic;font-weight:600;src:url('assets/fonts/Inter-600-italic.woff2') format('woff2');font-display:block}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:400;src:url('assets/fonts/JetBrainsMono-400.woff2') format('woff2');font-display:block}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:500;src:url('assets/fonts/JetBrainsMono-500.woff2') format('woff2');font-display:block}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:700;src:url('assets/fonts/JetBrainsMono-700.woff2') format('woff2');font-display:block}

        #root {
          position: absolute;
          inset: 0;
          overflow: hidden;
          font-family: 'Inter', sans-serif;
        }

        .clip {
          position: absolute;
          inset: 0;
        }

        .ground {
          background-color: #0b1220;
          background-image:
            linear-gradient(rgba(80, 140, 240, 0.12) 1px, transparent 1px),
            linear-gradient(90deg, rgba(80, 140, 240, 0.12) 1px, transparent 1px);
          background-size: 38px 38px;
        }

        .window {
          position: absolute;
          left: 288px;
          top: 217px;
          width: 1344px;
          height: 560px;
          border-radius: 18px;
          border: 1.5px solid rgba(91, 157, 255, 0.35);
          box-shadow:
            0 30px 90px rgba(0, 0, 0, 0.55),
            0 0 0 1px rgba(91, 157, 255, 0.1);
          overflow: hidden;
          transform-origin: 50% 46%;
          will-change: transform;
        }

        .window img {
          display: block;
          width: 100%;
          height: 100%;
          object-fit: cover;
          object-position: center top;
        }

        .pill-row {
          position: absolute;
          left: 288px;
          width: 1344px;
          text-align: center;
        }

        #pill-row-cost {
          top: 306px;
        }

        #pill-row-rows {
          top: 368px;
        }

        .pill {
          display: inline-flex;
          align-items: center;
          padding: 13px 28px;
          border-radius: 999px;
          background: rgba(15, 23, 42, 0.88);
          border: 1.5px solid rgba(239, 68, 68, 0.45);
          box-shadow: 0 10px 26px rgba(0, 0, 0, 0.4);
          font-family: 'JetBrains Mono', monospace;
          font-weight: 600;
          font-size: 24px;
          letter-spacing: 0.02em;
          color: #ef4444;
          transform-origin: 50% 50%;
          will-change: transform;
        }

        .headline {
          position: absolute;
          left: 0;
          top: 108px;
          width: 100%;
          text-align: center;
          font-family: 'Inter', sans-serif;
          font-weight: 600;
          font-size: 44px;
          letter-spacing: -0.01em;
          line-height: 1.15;
        }

        .hw {
          display: inline-block;
          margin: 0 9px;
          color: #e6edf7;
          will-change: transform;
        }

        .hw-accent {
          color: #5b9dff;
        }
      </style>

      <div id="root" data-composition-id="07-compare" data-width="1920" data-height="1080" data-duration="3.5">
        <div class="clip ground" data-start="0" data-duration="3.5" data-track-index="0"></div>

        <div class="clip content" data-start="0" data-duration="3.5" data-track-index="1">
          <div class="window" id="cmp-window">
            <img src="assets/compare.png" alt="" />
          </div>

          <div class="pill-row" id="pill-row-cost">
            <span class="pill" id="pill-cost">Cost +225%</span>
          </div>
          <div class="pill-row" id="pill-row-rows">
            <span class="pill" id="pill-rows">Rows +2400%</span>
          </div>

          <div class="headline" id="headline">
            <span class="hw">Before</span><span class="hw">vs</span><span class="hw">after</span><span class="hw">&mdash;</span><span class="hw hw-accent">side</span><span class="hw hw-accent">by</span><span class="hw hw-accent">side.</span>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Scene 1 (0.0-1.0s): the compare window settles in on a slight upward
        // scale/rise — spring-pop-entrance, smooth power3.out, no bounce.
        tl.fromTo(
          '#cmp-window',
          { scale: 0.92, opacity: 0, y: 28 },
          { scale: 1, opacity: 1, y: 0, duration: 0.6, ease: 'power3.out' },
          0
        );

        // Scene 2 (1.0-2.3s): two delta pills spring-pop at the center seam,
        // one per beat.
        tl.fromTo(
          '#pill-cost',
          { scale: 0, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.5, ease: 'power3.out' },
          1.0
        );
        tl.fromTo(
          '#pill-rows',
          { scale: 0, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.5, ease: 'power3.out' },
          1.5
        );

        // Scene 3 (2.3-3.5s): "Before vs after — side by side." reveals
        // per-word, top-center, deterministic stagger from the loop index.
        const words = gsap.utils.toArray('#headline .hw');
        const WORD_START = 2.3;
        const WORD_STAGGER = 0.11;
        const WORD_DUR = 0.35;
        words.forEach((el, i) => {
          tl.fromTo(
            el,
            { y: 16, opacity: 0 },
            { y: 0, opacity: 1, duration: WORD_DUR, ease: 'power3.out' },
            WORD_START + i * WORD_STAGGER
          );
        });

        window.__timelines['07-compare'] = tl;
      </script>
    </template>
  </body>
</html>
