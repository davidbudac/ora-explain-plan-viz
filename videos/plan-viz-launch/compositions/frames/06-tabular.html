<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        @font-face{font-family:'Inter';font-style:normal;font-weight:400;src:url('assets/fonts/Inter-400.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:500;src:url('assets/fonts/Inter-500.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:600;src:url('assets/fonts/Inter-600.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:700;src:url('assets/fonts/Inter-700.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:800;src:url('assets/fonts/Inter-800.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:900;src:url('assets/fonts/Inter-900.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:italic;font-weight:500;src:url('assets/fonts/Inter-500-italic.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:italic;font-weight:600;src:url('assets/fonts/Inter-600-italic.woff2') format('woff2');font-display:block}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:400;src:url('assets/fonts/JetBrainsMono-400.woff2') format('woff2');font-display:block}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:500;src:url('assets/fonts/JetBrainsMono-500.woff2') format('woff2');font-display:block}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:700;src:url('assets/fonts/JetBrainsMono-700.woff2') format('woff2');font-display:block}

        #root {
          position: relative;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          font-family: 'Inter', sans-serif;
          background: transparent;
        }

        /* Full-bleed navy ground + faint blue grid -- own dedicated clip, lowest track */
        .bg-grid {
          position: absolute;
          inset: 0;
          background-color: #0b1220;
          background-image:
            linear-gradient(to right, rgba(80, 140, 240, 0.12) 1px, transparent 1px),
            linear-gradient(to bottom, rgba(80, 140, 240, 0.12) 1px, transparent 1px);
          background-size: 40px 40px;
        }

        .content {
          position: absolute;
          inset: 0;
        }

        /* Shared floating-window recipe (frames 3,4,6,7,8) */
        .window {
          position: absolute;
          left: 288px;
          top: 172px;
          width: 1344px;
          height: 650px;
          border-radius: 18px;
          border: 1.5px solid rgba(91, 157, 255, 0.35);
          box-shadow:
            0 30px 90px rgba(0, 0, 0, 0.55),
            0 0 0 1px rgba(91, 157, 255, 0.1);
          overflow: hidden;
          transform-origin: 50% 46%;
          will-change: transform;
        }

        .window img {
          display: block;
          width: 100%;
          height: 100%;
          object-fit: cover;
          object-position: center top;
        }

        /* Top->down highlight band that sweeps the grid rows (clipped by .window) */
        .sweep-band {
          position: absolute;
          left: 0;
          width: 100%;
          height: 190px;
          background: linear-gradient(
            to bottom,
            rgba(91, 157, 255, 0) 0%,
            rgba(91, 157, 255, 0.22) 42%,
            rgba(91, 157, 255, 0.32) 50%,
            rgba(91, 157, 255, 0.22) 58%,
            rgba(91, 157, 255, 0) 100%
          );
          mix-blend-mode: screen;
          pointer-events: none;
          /* Default: parked off-screen above the window so any seek before
             the Scene-2 sweep (or after it completes) reads correctly. The
             driver tween below overwrites this via style.transform. */
          transform: translateY(-190px);
          will-change: transform;
        }

        .headline {
          position: absolute;
          left: 288px;
          top: 850px;
          width: 1000px;
          font-family: 'Inter', sans-serif;
          font-weight: 600;
          font-size: 44px;
          letter-spacing: -0.01em;
          line-height: 1.15;
          text-align: left;
        }

        .hw {
          display: inline-block;
          margin-right: 12px;
          color: #e6edf7;
          will-change: transform, opacity;
        }

        .hw-accent {
          color: #5b9dff;
        }
      </style>

      <div id="root" data-composition-id="06-tabular" data-width="1920" data-height="1080" data-duration="3">
        <div class="clip bg-grid" data-start="0" data-duration="3" data-track-index="0"></div>

        <div class="clip content" data-start="0" data-duration="3" data-track-index="1">
          <div class="window" id="tab-window">
            <img src="assets/tabular.png" alt="" />
            <div class="sweep-band" id="sweep-band"></div>
          </div>

          <div class="headline" id="headline">
            <span class="hw">Estimated</span><span class="hw">vs</span><span class="hw hw-accent">actual</span><span class="hw">&mdash;</span><span class="hw">every</span><span class="hw">op.</span>
          </div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // --- Scene 1 (0.0-1.2s): hard cut; window settles in on a slight
        // upward scale (spring-pop-entrance, power3.out, no bounce). ---
        tl.fromTo(
          '#tab-window',
          { scale: 0.9, opacity: 0, y: 26 },
          { scale: 1, opacity: 1, y: 0, duration: 0.7, ease: 'power3.out' },
          0.05
        );

        // --- Scene 2 (1.2-2.2s): a soft ink-soft highlight band sweeps
        // top->down across the grid rows -- a single driver tweened and
        // rendered in onUpdate (dynamic-content-sequencing's driver
        // mechanic), adapted here to a positional sweep instead of a text
        // swap: one continuous downward pass, no loop. The driver itself
        // spans through the end of the frame (not just the 1.0s sweep) so
        // onUpdate keeps rendering -- and holding the post-sweep resting
        // position -- under an arbitrary seek, the same safety the shared
        // full-duration drivers use elsewhere in this project. ---
        const band = document.getElementById('sweep-band');
        const BAND_H = 190;
        const WINDOW_H = 650;
        const SWEEP_START = 1.2;
        const SWEEP_DUR = 1.0;
        const FRAME_END = 3.0;
        const sweepEase = gsap.parseEase('power1.inOut');
        const sweepDriver = { t: 0 };
        tl.to(
          sweepDriver,
          {
            t: FRAME_END - SWEEP_START,
            duration: FRAME_END - SWEEP_START,
            ease: 'none',
            onUpdate: () => {
              const progress = Math.min(sweepDriver.t / SWEEP_DUR, 1);
              const eased = sweepEase(progress);
              const y = -BAND_H + eased * (WINDOW_H + BAND_H * 2);
              band.style.transform = `translateY(${y}px)`;
            },
          },
          SWEEP_START
        );

        // --- Scene 3 (2.2-3.0s): "Estimated vs actual -- every op." reveals
        // per-word, lower-left, deterministic stagger from the loop index;
        // "actual" set in ink-soft. Holds to the end (subtle jitter only). ---
        const words = gsap.utils.toArray('#headline .hw');
        const WORD_START = 2.2;
        const WORD_STAGGER = 0.09;
        const WORD_DUR = 0.32;
        words.forEach((el, i) => {
          tl.fromTo(
            el,
            { y: 16, opacity: 0 },
            { y: 0, opacity: 1, duration: WORD_DUR, ease: 'power3.out' },
            WORD_START + i * WORD_STAGGER
          );
        });

        window.__timelines['06-tabular'] = tl;
      </script>
    </template>
  </body>
</html>
