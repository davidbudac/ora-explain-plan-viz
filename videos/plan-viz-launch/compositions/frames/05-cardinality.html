<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        @font-face{font-family:'Inter';font-style:normal;font-weight:400;src:url('assets/fonts/Inter-400.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:500;src:url('assets/fonts/Inter-500.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:600;src:url('assets/fonts/Inter-600.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:700;src:url('assets/fonts/Inter-700.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:800;src:url('assets/fonts/Inter-800.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:normal;font-weight:900;src:url('assets/fonts/Inter-900.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:italic;font-weight:500;src:url('assets/fonts/Inter-500-italic.woff2') format('woff2');font-display:block}
        @font-face{font-family:'Inter';font-style:italic;font-weight:600;src:url('assets/fonts/Inter-600-italic.woff2') format('woff2');font-display:block}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:400;src:url('assets/fonts/JetBrainsMono-400.woff2') format('woff2');font-display:block}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:500;src:url('assets/fonts/JetBrainsMono-500.woff2') format('woff2');font-display:block}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:700;src:url('assets/fonts/JetBrainsMono-700.woff2') format('woff2');font-display:block}

        #root {
          position: relative;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          font-family: "Inter", sans-serif;
          background: transparent;
        }

        /* Full-bleed navy ground + faint blue grid -- own dedicated clip, lowest track */
        .bg-grid {
          position: absolute;
          inset: 0;
          background-color: #0b1220;
          background-image:
            linear-gradient(to right, rgba(80, 140, 240, 0.12) 1px, transparent 1px),
            linear-gradient(to bottom, rgba(80, 140, 240, 0.12) 1px, transparent 1px);
          background-size: 40px 40px;
        }

        /* Camera stage: static full-bleed hit box the camera transform lives inside */
        .camera-stage {
          position: absolute;
          inset: 0;
          overflow: hidden;
        }

        .camera {
          position: absolute;
          inset: 0;
          transform-origin: 50% 50%;
          will-change: transform;
        }

        .content {
          position: absolute;
          inset: 0;
        }

        /* Supporting card -- right ~40%, framed on the NESTED LOOPS node + detail panel */
        .card {
          position: absolute;
          right: 90px;
          top: 150px;
          width: 760px;
          height: 620px;
          border-radius: 14px;
          border: 1.5px solid rgba(91, 157, 255, 0.35);
          box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
          overflow: hidden;
          will-change: transform, opacity;
        }

        .card img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          /* right-anchored crop -- keeps the NESTED LOOPS node + full detail panel in frame */
          object-position: 100% 50%;
          display: block;
        }

        /* Typewriter block -- two mono lines, context-sensitive cursor per row */
        .type-block {
          position: absolute;
          left: 130px;
          top: 400px;
          width: 760px;
          display: flex;
          flex-direction: column;
          gap: 24px;
          font-family: "JetBrains Mono", monospace;
          will-change: transform, opacity;
        }

        .type-row {
          display: flex;
          align-items: baseline;
          white-space: nowrap;
          font-size: 42px;
          font-weight: 500;
        }

        .prompt {
          color: #5b9dff;
          margin-right: 18px;
        }

        .ttext {
          color: #e6edf7;
        }

        .cursor {
          display: inline-block;
          width: 18px;
          height: 42px;
          margin-left: 8px;
          opacity: 0;
        }

        .cursor-estimate {
          background: #5b9dff;
        }

        .cursor-actual {
          background: #f59e0b;
        }

        /* Hero metric -- count-up numeral + label, frame-center-left */
        .hero {
          position: absolute;
          left: 0;
          width: 1060px;
          top: 300px;
          text-align: center;
          will-change: transform, opacity;
        }

        .counter-wrap {
          display: flex;
          align-items: baseline;
          justify-content: center;
          gap: 14px;
        }

        .counter {
          font-family: "Inter", sans-serif;
          font-weight: 400;
          font-variant-numeric: tabular-nums;
          letter-spacing: -0.015em;
          line-height: 0.9;
          color: #f59e0b;
          font-size: 230px;
          transform: scale(0.478); /* START_SCALE; the count tween drives it to 1 */
          transform-origin: center bottom;
          will-change: transform;
        }

        .counter-suffix {
          font-family: "Inter", sans-serif;
          font-weight: 400;
          font-size: 130px;
          letter-spacing: -0.01em;
          color: #ef4444;
          opacity: 0;
        }

        .label {
          margin-top: 36px;
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
          gap: 16px;
          font-family: "Inter", sans-serif;
          font-weight: 500;
          font-size: 44px;
          letter-spacing: -0.005em;
          color: #5b9dff;
          opacity: 0;
        }

        .word {
          display: inline-block;
          transform-origin: 50% 50%;
          will-change: transform, text-shadow, color;
        }
      </style>

      <div
        id="root"
        data-composition-id="05-cardinality"
        data-width="1920"
        data-height="1080"
        data-duration="4"
      >
        <div class="bg-grid clip" data-start="0" data-duration="4" data-track-index="0"></div>

        <div class="camera-stage clip" data-start="0" data-duration="4" data-track-index="1">
          <div class="camera" id="camera">
            <div class="content">
              <div class="card" id="card">
                <img src="assets/cardinality.png" alt="" />
              </div>

              <div class="type-block" id="typeblock">
                <div class="type-row">
                  <span class="prompt">&gt;</span
                  ><span class="ttext" id="line1text"></span
                  ><span class="cursor cursor-estimate" id="cursor1"></span>
                </div>
                <div class="type-row">
                  <span class="prompt">&gt;</span
                  ><span class="ttext" id="line2text"></span
                  ><span class="cursor cursor-actual" id="cursor2"></span>
                </div>
              </div>

              <div class="hero" id="numeralWrap">
                <div class="counter-wrap">
                  <span class="counter" id="counter">1.0</span
                  ><span class="counter-suffix" id="suffix">&times;</span>
                </div>
                <div class="label" id="label">
                  <span class="word" id="word1">cardinality</span>
                  <span class="word" id="word2">blowups,</span>
                  <span class="word" id="word3">caught.</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        const TOTAL_DURATION = 4;

        // --- Macro camera: slow continuous push + subtle jitter (never a big move) ---
        const camera = document.getElementById("camera");
        const phase = { scale: 1.0 };
        tl.to(phase, { scale: 1.06, duration: TOTAL_DURATION, ease: "power1.inOut" }, 0);

        const drift = { p: 0 };
        tl.to(
          drift,
          {
            p: Math.PI * 2 * 2,
            duration: TOTAL_DURATION,
            ease: "none",
            onUpdate: () => {
              const dx = Math.sin(drift.p) * 3;
              const dy = Math.sin(drift.p * 1.3) * 2;
              camera.style.transform = `scale(${phase.scale}) translate(${dx}px, ${dy}px)`;
            },
          },
          0,
        );

        // --- Scene 1 (0.0-1.0s): supporting card fades/pushes in on the right ---
        tl.fromTo(
          "#card",
          { x: 50, opacity: 0 },
          { x: 0, opacity: 0.72, duration: 0.7, ease: "power3.out" },
          0.05,
        );
        // dims further once the camera starts pushing through, toward scene 2
        tl.to("#card", { opacity: 0.4, duration: 0.5, ease: "power2.out" }, 1.05);

        // discrete-text-sequence: two mono lines, bulk-chunk reveals (not linear typewriter)
        const LINE1_SEQ = [
          { t: 0.0, text: "" },
          { t: 0.05, text: "Est" },
          { t: 0.11, text: "Estimat" },
          { t: 0.17, text: "Estimated" },
          { t: 0.23, text: "Estimated 1" },
          { t: 0.28, text: "Estimated 12" },
          { t: 0.33, text: "Estimated 126" },
        ];
        const LINE2_SEQ = [
          { t: 0.45, text: "" },
          { t: 0.5, text: "Act" },
          { t: 0.55, text: "Actually" },
          { t: 0.6, text: "Actually 8" },
          { t: 0.65, text: "Actually 80" },
          { t: 0.7, text: "Actually 80,0" },
          { t: 0.75, text: "Actually 80,00" },
          { t: 0.8, text: "Actually 80,000" },
        ];
        const LINE2_START = 0.45;
        const BLINK_CYCLES = 1.5; // ~0.67s period across the 1s typing window

        function textAt(seq, time) {
          for (let i = seq.length - 1; i >= 0; i--) {
            if (time >= seq[i].t) return seq[i].text;
          }
          return "";
        }

        const line1Text = document.getElementById("line1text");
        const line2Text = document.getElementById("line2text");
        const cursor1 = document.getElementById("cursor1");
        const cursor2 = document.getElementById("cursor2");

        const typeDriver = { t: 0 };
        tl.to(
          typeDriver,
          {
            t: 1.0,
            duration: 1.0,
            ease: "none",
            onUpdate: () => {
              const time = typeDriver.t;
              line1Text.textContent = textAt(LINE1_SEQ, time);
              line2Text.textContent = textAt(LINE2_SEQ, time);
              const line1Active = time < LINE2_START;
              const blinkOn = Math.sin(time * Math.PI * 2 * BLINK_CYCLES) > 0 ? 1 : 0;
              cursor1.style.opacity = line1Active ? blinkOn : 0;
              cursor2.style.opacity = !line1Active ? blinkOn : 0;
            },
          },
          0,
        );

        // --- Scene 2 (1.0-2.8s): camera pushes THROUGH the typed lines toward the hero numeral ---
        tl.fromTo(
          "#typeblock",
          { scale: 1, opacity: 1 },
          { scale: 5.5, opacity: 0, duration: 0.55, ease: "power3.in" },
          1.0,
        );

        tl.fromTo(
          "#numeralWrap",
          { opacity: 0, scale: 0.8 },
          { opacity: 1, scale: 1, duration: 0.4, ease: "power3.out" },
          1.05,
        );

        // counting-dynamic-scale: value + scale + color ramp share one ease.
        // Scale (not font-size) so the growth interpolates sub-pixel and stays
        // smooth under the seek-by-frame renderer (font-size snaps to device px).
        const counterEl = document.getElementById("counter");
        const START_SCALE = 110 / 230; // visual start size relative to the fixed 230px
        const END_SCALE = 1;
        const WARN_RGB = { r: 245, g: 158, b: 11 };
        const HOT_RGB = { r: 239, g: 68, b: 68 };
        function lerpCh(a, b, t) {
          return Math.round(a + (b - a) * t);
        }
        const countState = { value: 1, scale: START_SCALE };
        tl.to(
          countState,
          {
            value: 634.9,
            scale: END_SCALE,
            duration: 1.5,
            ease: "power3.out",
            onUpdate: () => {
              counterEl.textContent = countState.value.toFixed(1);
              counterEl.style.transform = `scale(${countState.scale})`;
              const progress = (countState.value - 1) / (634.9 - 1);
              const r = lerpCh(WARN_RGB.r, HOT_RGB.r, progress);
              const g = lerpCh(WARN_RGB.g, HOT_RGB.g, progress);
              const b = lerpCh(WARN_RGB.b, HOT_RGB.b, progress);
              counterEl.style.color = `rgb(${r}, ${g}, ${b})`;
            },
          },
          1.25,
        );

        // suffix lands after the count settles -- its own beat, no bounce
        tl.fromTo(
          "#suffix",
          { opacity: 0, y: 16 },
          { opacity: 1, y: 0, duration: 0.35, ease: "power3.out" },
          2.75,
        );

        // --- Scene 3 (2.8-4.0s): numeral locks; label glows in beneath; HOLD ---
        tl.fromTo(
          "#label",
          { opacity: 0, y: 14 },
          { opacity: 1, y: 0, duration: 0.4, ease: "power3.out" },
          2.85,
        );

        // asr-keyword-glow: per-word attack-sustain-decay-rest envelope, timings local to scene 3
        const ATTACK_DUR = 0.15;
        const RELEASE = 0.25;
        const REST_LEVEL = 0.3;
        const MAX_BLUR = 18;
        const MAX_SCALE_BOOST = 0.06;
        const REST_RGB = { r: 70, g: 100, b: 150 };
        const PEAK_RGB = { r: 165, g: 205, b: 255 };

        const WORD_TIMINGS = {
          word1: { start: 0.1, end: 0.25 },
          word2: { start: 0.35, end: 0.5 },
          word3: { start: 0.6, end: 0.8 },
        };

        function envelope(time, start, end) {
          const releaseEnd = end + RELEASE;
          if (time < start) return 0;
          if (time < end) {
            return Math.min((time - start) / ATTACK_DUR, 1);
          }
          if (time < releaseEnd) {
            const decay = (time - end) / RELEASE;
            return 1 - decay * (1 - REST_LEVEL);
          }
          return REST_LEVEL;
        }

        const wordEls = {
          word1: document.getElementById("word1"),
          word2: document.getElementById("word2"),
          word3: document.getElementById("word3"),
        };

        const glowDriver = { t: 0 };
        tl.to(
          glowDriver,
          {
            t: 1.2,
            duration: 1.2,
            ease: "none",
            onUpdate: () => {
              Object.keys(WORD_TIMINGS).forEach((key) => {
                const timing = WORD_TIMINGS[key];
                const env = envelope(glowDriver.t, timing.start, timing.end);
                const blur = MAX_BLUR * env;
                const scale = 1 + MAX_SCALE_BOOST * env;
                const r = lerpCh(REST_RGB.r, PEAK_RGB.r, env);
                const g = lerpCh(REST_RGB.g, PEAK_RGB.g, env);
                const b = lerpCh(REST_RGB.b, PEAK_RGB.b, env);
                const el = wordEls[key];
                el.style.textShadow = `0 0 ${blur}px rgba(${r}, ${g}, ${b}, ${0.4 + env * 0.5})`;
                el.style.transform = `scale(${scale})`;
                el.style.color = `rgb(${r}, ${g}, ${b})`;
              });
            },
          },
          2.8,
        );

        window.__timelines["05-cardinality"] = tl;
      </script>
    </template>
  </body>
</html>
